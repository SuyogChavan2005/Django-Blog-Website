{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Update Post</title>


  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700,900&display=swap"
        rel="stylesheet">


  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">


  <!-- Template CSS -->
  <link rel="stylesheet" href="{% static 'assets/css/fontawesome.css' %}">
  <link rel="stylesheet" href="{% static 'assets/css/templatemo-stand-blog.css' %}">
  <link rel="stylesheet" href="{% static 'assets/css/owl.css' %}">


<style>

body{
    font-family: 'Roboto', sans-serif;
}


/* Header */

.navbar{
    padding:15px 0;
}


.navbar-brand h2{
    font-size:32px;
    font-weight:700;
}


.nav-link{
    color:#222 !important;
    font-size:16px;
    font-weight:500;
    margin-left:20px;
    transition:0.3s;
}


.nav-link:hover{
    color:#f16e46 !important;
}


.navbar-toggler{
    border:none;
}


.navbar-toggler:focus{
    box-shadow:none;
}


/* Form */

.update-container{

    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

}


form{

    width:50%;
    margin-top:100px;

}


h5{

    color:#ed3f3f;
    font-weight:600;
    font-size:30px;
}


.btn{

    margin-top:30px;
    background:#ec5858;
    width:100%;
    color:white;
    font-size:20px;
    padding:8px;
    border:none;

}


.btn:hover{

    background:transparent;
    color:#ed3f3f;
    border:1px solid #ed3f3f;

}


label{

    margin-top:15px;
}


/* Mobile */

@media(max-width:991px){


    .navbar-nav{

        padding-top:20px;

    }


    .nav-link{

        margin-left:0;

    }


}


@media(max-width:600px){


    form{

        width:100%;
        padding:25px !important;

    }


}

</style>


</head>



<body>



<!-- Header -->

<header>

<nav class="navbar navbar-expand-lg bg-white shadow-sm">

<div class="container">


<!-- Logo -->

<a class="navbar-brand" href="{% url 'index' %}">

<h2 class="mb-0">

SSC <span style="color:#f16e46;">BLOG</span>

</h2>

</a>



<!-- Mobile Button -->

<button class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#navbarResponsive"
aria-controls="navbarResponsive"
aria-expanded="false"
aria-label="Toggle navigation">


<span class="navbar-toggler-icon"></span>


</button>



<!-- Menu -->

<div class="collapse navbar-collapse" id="navbarResponsive">


<ul class="navbar-nav ms-auto">


<li class="nav-item">

<a class="nav-link" href="{% url 'index' %}">
Home
</a>

</li>



<li class="nav-item">

<a class="nav-link" href="{% url 'blog' %}">
Blogs
</a>

</li>



{% if user.is_authenticated %}



<li class="nav-item">

<a class="nav-link" href="{% url 'create' %}">
Create
</a>

</li>



<li class="nav-item">

<a class="nav-link" href="{% url 'profile' user.id %}">
Profile
</a>

</li>



<li class="nav-item">

<a class="nav-link" href="{% url 'logout' %}">
Logout
</a>

</li>



{% else %}



<li class="nav-item">

<a class="nav-link" href="{% url 'signin' %}">
Login
</a>

</li>



{% endif %}



</ul>


</div>


</div>

</nav>


</header>





<!-- Update Post Form -->


<div class="container update-container">


<form action="{% url 'editpost' post.id %}"
      method="post"
      enctype="multipart/form-data"
      class="p-5 shadow rounded">


{% csrf_token %}



<h5 class="mb-4">
Update Your Post
</h5>




<label class="form-label">
Title
</label>


<input type="text"
class="form-control"
name="postname"
value="{{post.postname}}"
required>





<label class="form-label">
Content
</label>


<textarea class="form-control"
name="content"
rows="6"
required>{{post.content}}</textarea>





<label class="form-label">
Category
</label>


<input type="text"
class="form-control"
name="category"
value="{{post.category}}"
required>




<button class="btn">
Update Post
</button>





{% for message in messages %}

<p class="text-danger mt-3">
{{message}}
</p>

{% endfor %}



</form>


</div>





{% include 'footer.html' %}





<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js">
</script>


</body>

</html>
